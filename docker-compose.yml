version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mediawiki
      MYSQL_USER: mediawiki
      MYSQL_PASSWORD: mediawikipass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  mediawiki:
    build: .
    ports:
      - "80:80"
    depends_on:
      - db
    environment:
      DB_SERVER: db
      DB_NAME: mediawiki
      DB_USER: mediawiki
      DB_PASSWORD: mediawikipass
    volumes:
      - ./images:/var/www/html/images

volumes:
  db_data:
